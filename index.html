<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小游戏站 | Game Hub</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <h1 class="logo">Game Hub</h1>
        <nav>
          <a href="#games">游戏列表</a>
          <a href="#play">开始游戏</a>
          <a href="#rank">排行榜</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <section id="games" class="panel">
        <h2>小游戏网站框架</h2>
        <p>当前内置三个游戏：躲避方块 + 贪吃蛇 + 飞跃小鸟，可继续扩展更多小游戏。</p>
        <div class="game-tags">
          <span>Canvas 游戏</span>
          <span>本地排行榜</span>
          <span>可扩展关卡</span>
        </div>
        <div class="game-switch">
          <button id="switch-dodge-btn" class="switch-btn active">躲避方块</button>
          <button id="switch-snake-btn" class="switch-btn">贪吃蛇</button>
          <button id="switch-bird-btn" class="switch-btn">飞跃小鸟</button>
        </div>
      </section>

      <section id="play" class="panel">
        <div class="play-header">
          <h3 id="game-title">躲避方块</h3>
          <p id="game-desc">键盘方向键或 WASD 移动蓝色方块，躲避红色障碍。</p>
        </div>

        <div class="status-bar">
          <span>分数：<b id="score">0</b></span>
          <span>最高分：<b id="best-score">0</b></span>
          <span>速度等级：<b id="speed-level">-</b></span>
          <span>状态：<b id="game-state">未开始</b></span>
        </div>

        <canvas id="game-canvas" width="640" height="360"></canvas>

        <div class="actions">
          <button id="start-btn">开始</button>
          <button id="pause-btn">暂停</button>
          <button id="reset-btn">重置</button>
        </div>
      </section>

      <section id="rank" class="panel">
        <h3 id="rank-title">排行榜（本地）- 躲避方块</h3>
        <ol id="rank-list"></ol>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">© <span id="year"></span> Game Hub</div>
    </footer>

    <script src="./app.js"></script>
  </body>
</html>
